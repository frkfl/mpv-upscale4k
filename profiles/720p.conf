[hd-ready]
# 720p is present everywhere and yet, it should not : Bluray, Streamers are 1080p
# The real 720p era is short, amateur cameras, TV content.
# The 720p we face is horrible upscale of DVD, horrible rip of BR
# The quality is in most case an abomination filled with compression and color problems.
# The answer to that which is rather universal is softness :
# A good cleaning, a soft upscale, a very predictible sharpening, entropy introduction

# Applies to 720p..900p
profile-cond=width >= 800 and width < 1600

# Deterministic OkLab (Björn Ottosson) BT.601/709 → BT.2020 normalizer
glsl-shaders-append="~~/shaders/autocolormatrix.glsl"

# Cleaning
# Mild Clean+BlockFix (edge-aware denoise + flat deblock + dering + stochastic gating)
glsl-shaders-append="~~/shaders/mild_clean_blockfix.glsl"
glsl-shader-opts-append=mcb_clean_strength=0.5
# Weird geomatrical shapes attenuation
glsl-shaders-append="~~/shaders/fake_micro_texture_removal.glsl"
glsl-shader-opts-append=fmtr_clean=0.05
# Softening
glsl-shaders-append="~~/shaders/nlmeans_parameter.glsl"
glsl-shader-opts-append=nl_strength=0.20
# Deband
glsl-shaders-append="~~/shaders-dl/hdeband.glsl"
# Restore some crispness before a soft upscale
glsl-shaders-append="~~/shaders-dl/adaptive_sharpen_RT.glsl"

glsl-shaders-append="~~/shaders/temporal_motion_blur.glsl"
glsl-shader-opts-append=tmb_strength=0.5

# HDR-safe OkLCH vibrance
#glsl-shaders-append="~~/shaders/oklch_vibrance.glsl"
#glsl-shader-opts-append=ov_vibrance=0.22
#glsl-shader-opts-append=ov_skin_protect=0.55
#glsl-shader-opts-append=ov_skin_hue=0.07
#glsl-shader-opts-append=ov_skin_width=0.08
#glsl-shader-opts-append=ov_mid_bias=0.50
#glsl-shader-opts-append=ov_gamma_in=1.0
#glsl-shader-opts-append=ov_gamma_out=1.05
#glsl-shader-opts-append=ov_chroma_tame=0.10
# Texture Balance Map (TBM) – pre-upscale texture density equalization
#glsl-shaders-append="~~/shaders/tbm.glsl"
#glsl-shader-opts-append=tbm_base_strength=0.021
#glsl-shader-opts-append=tbm_a_low=0.010
#glsl-shader-opts-append=tbm_a_high=0.140

# C - Upscaling 4K (Soft)
glsl-shaders-append="~~/shaders-dl/CfL_Prediction_RT.glsl"
glsl-shaders-append="~~/shaders-dl/KrigBilateral.glsl"
glsl-shaders-append="~~/shaders-dl/ravu-r4.hook"
glsl-shaders-append="~~/shaders-dl/SSimSuperRes_RT.glsl"

# Post-sharpen anti-ringing mop-up
glsl-shaders-append="~~/shaders/ringing_guard.glsl"
glsl-shader-opts-append=rg_strength=0.85
glsl-shader-opts-append=rg_radius=1.5
glsl-shader-opts-append=rg_gamma_in=1.0
glsl-shader-opts-append=rg_gamma_out=1.0
glsl-shader-opts-append=rg_lobe_strength=0.65
glsl-shader-opts-append=rg_lobe_threshold=0.015
glsl-shader-opts-append=rg_lobe_priority=0.65
glsl-shader-opts-append=rg_delta_cap=0.5
glsl-shader-opts-append=rg_apply_threshold=0.02
# Smoothing (border)
glsl-shaders-append="~~/shaders/micro_diffusion.glsl"
glsl-shader-opts-append=md_strength=3.5
glsl-shader-opts-append=md_low=0.001
glsl-shader-opts-append=md_high=0.04
glsl-shader-opts-append=md_radius=1.2
# Edge AA (stabilizes FSR/SSim ringing in motion)
glsl-shaders-append="~~/shaders/smaa.glsl"
glsl-shader-opts-append=sma_edge_strength=0.68
glsl-shader-opts-append=sma_corner_strength=0.22
glsl-shader-opts-append=sma_gamma=1.0

# Quality improvements
# Sharpening
glsl-shaders-append="~~/shaders-dl/LumaSharpen.glsl"
glsl-shaders-append="~~/shaders-dl/AMD_CAS_RT.glsl"

# Temporal sharpen (TXAA-lite; keep modest)
glsl-shaders-append="~~/shaders/temporal_sharpen.glsl"
glsl-shader-opts-append=tsh_strength=0.35
glsl-shader-opts-append=tsh_radius=1.0
# Hair-aware sharpen (detail recovery)
glsl-shaders-append="~~/shaders/hair_aware_sharpen.glsl"
glsl-shader-opts-append=has_sharp_amt=0.64
glsl-shader-opts-append=has_hf_gain=1.65
glsl-shader-opts-append=has_flat_guard=0.92
glsl-shader-opts-append=has_temp_sense=0.68
glsl-shader-opts-append=has_clamp_amt=0.026
# Edge-aware sharpen (reined in but still strong)
glsl-shaders-append="~~/shaders/masked_sharpen.glsl"
glsl-shader-opts-append=msh_strength=0.40
glsl-shader-opts-append=msh_clamp_amt=0.038
glsl-shader-opts-append=msh_edge_low=0.02
glsl-shader-opts-append=msh_edge_high=0.24
glsl-shader-opts-append=msh_flat_protect=0.88
glsl-shader-opts-append=msh_motion_gate=0.65
glsl-shader-opts-append=msh_gamma_in=1.0
glsl-shader-opts-append=msh_gamma_out=1.0
# Micro-contrast
glsl-shaders-append="~~/shaders/micro_contrast.glsl"
glsl-shader-opts-append=mc_radius=0.8
glsl-shader-opts-append=mc_amount=0.12
glsl-shader-opts-append=mc_threshold=0.02
glsl-shader-opts-append=mc_gamma_in=1.0
glsl-shader-opts-append=mc_gamma_out=1.0

# Details additions
glsl-shaders-append="~~/shaders-dl/skin_texture_amplifier.glsl"
# Micro Detail Enhancer (Luma-only, edge-gated)
glsl-shaders-append="~~/shaders/micro_detail_luma.glsl"
glsl-shader-opts-append=mdl_strength=0.28
glsl-shader-opts-append=mdl_threshold=0.004
# Skin Detail Enhancer (skin-gated luma microtexture, grain-free output)
glsl-shaders-append="~~/shaders/skin_detail_luma.glsl"
glsl-shader-opts-append=sdl_strength=0.18
glsl-shader-opts-append=sdl_skin_hue=0.075
glsl-shader-opts-append=sdl_skin_width=0.070
glsl-shader-opts-append=sdl_skin_soft=0.030
glsl-shader-opts-append=sdl_freq=1.25
glsl-shader-opts-append=sdl_anisotropy=0.55

# Randomness in forms of different noise types (gated, blue, texture)
# Texture Balance Map (TBM) – pre-upscale texture density equalization
glsl-shaders-append="~~/shaders/tbm.glsl"
glsl-shader-opts-append=tbm_base_strength=0.021
glsl-shader-opts-append=tbm_a_low=0.010
glsl-shader-opts-append=tbm_a_high=0.140

# Add some texturing to uniform colors - anti plastic
glsl-shaders-append="~~/shaders/texture_classify.glsl"
glsl-shader-opts-append=tc_strength=0.8
# Light temporal texture
glsl-shaders-append="~~/shaders/temporal_luma_grain.glsl"
glsl-shader-opts-append=tlg_grain=10
glsl-shader-opts-append=tlg_motion=0.5
# Light temporal texture for skin
glsl-shaders-append="~~/shaders/skin_temporal_grain.glsl"
glsl-shader-opts-append=stg_grain=15
glsl-shader-opts-append=stg_motion=0.5
glsl-shader-opts-append=stg_skin_boost=1.0
