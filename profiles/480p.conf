[lowres]
profile-cond=width < 800

# Restoration profile (noisy VHS, DV, TV captures). Will lower DVD quality a bit
af=highpass=f=99,lowpass=f=16001,dynaudnorm=f=251:g=15:p=0.8,crystalizer=3,alimiter

# A — Analog Repair
# Deinterlace
deinterlace=auto
# Deterministic OkLab (Björn Ottosson) BT.601/709 → BT.2020 normalizer
glsl-shaders-append="~~/shaders/autocolormatrix.glsl"

# Front-End — Remove most of the common analog insanity
glsl-shaders-append="~~/shaders/normalize_frontend.glsl"
glsl-shader-opts-append=nf_th_low=0.030
glsl-shader-opts-append=nf_th_high=0.10
glsl-shader-opts-append=nf_shift_px=0.80
glsl-shader-opts-append=nf_k_strength=0.58
glsl-shader-opts-append=nf_alpha_yfb=0.12
glsl-shader-opts-append=nf_beta_cfb=0.025
glsl-shader-opts-append=nf_blur_sigma=0.95
glsl-shader-opts-append=nf_protect_gate=0.72
glsl-shader-opts-append=nf_shadow_thresh=0.045
glsl-shader-opts-append=nf_knee_gain=1.0
glsl-shader-opts-append=nf_ema_low=0.15
glsl-shader-opts-append=nf_ema_high=0.55
glsl-shader-opts-append=nf_motion_thr=0.03
glsl-shader-opts-append=nf_s_chroma_protect=0.75
glsl-shader-opts-append=nf_e_ref=0.08
glsl-shader-opts-append=nf_max_desat=0.28
# Post Front-End Stabilizer — optimized (3-tap directional dering, fused stats, stronger shimmering removal).
glsl-shaders-append="~~/shaders/post_frontend_stabilizer.glsl"
glsl-shader-opts-append=pfs_dering_sigma=0.85
glsl-shader-opts-append=pfs_dering_mix_max=0.30
glsl-shader-opts-append=pfs_agc_gamma=0.6
glsl-shader-opts-append=pfs_agc_k0=0.02
glsl-shader-opts-append=pfs_agc_k1=0.35
glsl-shader-opts-append=pfs_agc_delta_max=0.25
glsl-shader-opts-append=pfs_agc_scale_kappa=0.9
glsl-shader-opts-append=pfs_unclip_shadow_power=0.88
glsl-shader-opts-append=pfs_unclip_highlight_power=1.05
glsl-shader-opts-append=pfs_unclip_eta_fill=0.03
glsl-shader-opts-append=pfs_hue_cap_deg_skin=3.0
glsl-shader-opts-append=pfs_hue_cap_deg_global=5.0
glsl-shader-opts-append=pfs_sat_cap_skin=0.12
glsl-shader-opts-append=pfs_sat_cap_global=0.20
glsl-shader-opts-append=pfs_meanY_guard_pct=0.005
glsl-shader-opts-append=pfs_ring_kappa=0.5
glsl-shader-opts-append=pfs_ring_gain=3.0
glsl-shader-opts-append=pfs_protect_grad_lo=0.06
glsl-shader-opts-append=pfs_protect_grad_hi=0.16
glsl-shader-opts-append=pfs_motion_lo=0.01
glsl-shader-opts-append=pfs_motion_hi=0.03
glsl-shader-opts-append=pfs_highlights_gate_Y=0.85
# Temporal Stabilizer — suppress horizontal shimmer - Deterministic
glsl-shaders-append="~~/shaders/temporal_stabilizer.glsl"
glsl-shader-opts-append=ts_gx_thresh=0.04
glsl-shader-opts-append=ts_gy_thresh=0.25
glsl-shader-opts-append=ts_alpha_base=0.30
glsl-shader-opts-append=ts_luma_gate_lo=0.05
glsl-shader-opts-append=ts_luma_gate_hi=0.90
glsl-shader-opts-append=ts_luma_gate_strength=0.10
glsl-shader-opts-append=ts_phase_offset_px=0.0
glsl-shader-opts-append=ts_blur_sigma=0.15
# Structural Cleaning Reinforcement Pass
glsl-shaders-append="~~/shaders/analog_structure_cleaner.glsl"
glsl-shader-opts-append=asc_clean=0.6
glsl-shader-opts-append=asc_sharpen=0.7
# Edge Stabilization & Perceptual Phase Re-Alignment v2 (deterministic, perceptually tunable)
glsl-shaders-append="~~/shaders/edge_phase_realign_v2.glsl"
glsl-shader-opts-append=eprv_strength=2.0
glsl-shader-opts-append=eprv_edge_gain=4.0
glsl-shader-opts-append=eprv_edge_exp=3.0
glsl-shader-opts-append=eprv_phase_max=0.8
glsl-shader-opts-append=eprv_amp_norm=0.5
glsl-shader-opts-append=eprv_tangential_smooth=0.5
glsl-shader-opts-append=eprv_temporal_alpha=0.3
glsl-shader-opts-append=eprv_global_gain=3.0
glsl-shader-opts-append=eprv_skin_protect=0.0
# A not very fancy hdeband for hi8 8x8 macro blocks
glsl-shaders-append="~~/shaders/hi8_deblock.glsl"
glsl-shader-opts-append=hd_strength=1.95
# Mild Clean+BlockFix (edge-aware denoise + flat deblock + dering + stochastic gating)
glsl-shaders-append="~~/shaders/mild_clean_blockfix.glsl"
glsl-shader-opts-append=mcb_clean_strength=4.0

# B - Digital cleaning
glsl-shaders-append="~~/shaders-dl/LumaSharpen.glsl"
# Weird geomatrical shapes attenuation
glsl-shaders-append="~~/shaders/fake_micro_texture_removal.glsl"
glsl-shader-opts-append=fmtr_clean=0.1
# Softening
glsl-shaders-append="~~/shaders/nlmeans_parameter.glsl"
glsl-shader-opts-append=nl_strength=0.30
# Deband
glsl-shaders-append="~~/shaders-dl/hdeband.glsl"

# C - Upscaling 4K - Very soft with ravu, no neuronal network
glsl-shaders-append="~~/shaders-dl/CfL_Prediction_RT.glsl"
glsl-shaders-append="~~/shaders-dl/KrigBilateral.glsl"
glsl-shaders-append="~~/shaders-dl/ravu-r4.hook"
glsl-shaders-append="~~/shaders-dl/SSimSuperRes_RT.glsl"
glsl-shaders-append="~~/shaders-dl/SSimDownscaler.glsl"

# Motion blur
glsl-shaders-append="~~/shaders/temporal_motion_blur.glsl"
glsl-shader-opts-append=tmb_strength=0.6

# D - Calming the upscaling
# In-video subtitles cleaner
glsl-shaders-append="~~/shaders/subtitle_cleaner.glsl"
glsl-shader-opts-append=sc_strength=1.40
# Smoothing border
glsl-shaders-append="~~/shaders/micro_diffusion.glsl"
glsl-shader-opts-append=md_strength=1.8
glsl-shader-opts-append=md_low=0.001
glsl-shader-opts-append=md_high=0.04
glsl-shader-opts-append=md_radius=1.2
# Post-sharpen anti-ringing mop-up
glsl-shaders-append="~~/shaders/ringing_guard.glsl"
glsl-shader-opts-append=rg_strength=0.85
glsl-shader-opts-append=rg_radius=1.5
glsl-shader-opts-append=rg_gamma_in=1.0
glsl-shader-opts-append=rg_gamma_out=1.0
glsl-shader-opts-append=rg_lobe_strength=0.65
glsl-shader-opts-append=rg_lobe_threshold=0.015
glsl-shader-opts-append=rg_lobe_priority=0.65
glsl-shader-opts-append=rg_delta_cap=0.5
glsl-shader-opts-append=rg_apply_threshold=0.02
# Edge AA (stabilizes FSR/SSim ringing in motion)
glsl-shaders-append="~~/shaders/smaa.glsl"
glsl-shader-opts-append=sma_edge_strength=0.78
glsl-shader-opts-append=sma_corner_strength=0.22
glsl-shader-opts-append=sma_gamma=1.0

# Still a bit blurry
# Sharpening from a cleand up base, so we can be more aggressive with it without amplifying noise
glsl-shaders-append="~~/shaders-dl/AMD_CAS_RT.glsl"
#glsl-shaders-append="~~/shaders-dl/NVSharpen.glsl"
#glsl-shaders-append="~~/shaders-dl/adaptive_sharpen_RT.glsl"

# E - Quality improvements
# Temporal sharpen (TXAA-lite; keep modest)
glsl-shaders-append="~~/shaders/temporal_sharpen.glsl"
glsl-shader-opts-append=tsh_strength=0.35
glsl-shader-opts-append=tsh_radius=1.0
# Hair-aware sharpen (detail recovery)
glsl-shaders-append="~~/shaders/hair_aware_sharpen.glsl"
glsl-shader-opts-append=has_sharp_amt=0.64
glsl-shader-opts-append=has_hf_gain=1.65
glsl-shader-opts-append=has_flat_guard=0.92
glsl-shader-opts-append=has_temp_sense=0.68
glsl-shader-opts-append=has_clamp_amt=0.026
# Edge-aware sharpen (reined in but still strong)
glsl-shaders-append="~~/shaders/masked_sharpen.glsl"
glsl-shader-opts-append=msh_strength=0.40
glsl-shader-opts-append=msh_clamp_amt=0.038
glsl-shader-opts-append=msh_edge_low=0.02
glsl-shader-opts-append=msh_edge_high=0.24
glsl-shader-opts-append=msh_flat_protect=0.88
glsl-shader-opts-append=msh_motion_gate=0.65
glsl-shader-opts-append=msh_gamma_in=1.0
glsl-shader-opts-append=msh_gamma_out=1.0
# Micro-contrast
glsl-shaders-append="~~/shaders/micro_contrast.glsl"
glsl-shader-opts-append=mc_radius=0.8
glsl-shader-opts-append=mc_amount=0.12
glsl-shader-opts-append=mc_threshold=0.02
glsl-shader-opts-append=mc_gamma_in=1.0
glsl-shader-opts-append=mc_gamma_out=1.0
# Details additions
glsl-shaders-append="~~/shaders-dl/skin_texture_amplifier.glsl"
# Micro Detail Enhancer (Luma-only, edge-gated)
glsl-shaders-append="~~/shaders/micro_detail_luma.glsl"
glsl-shader-opts-append=mdl_strength=0.28
glsl-shader-opts-append=mdl_threshold=0.004
# Skin Detail Enhancer (skin-gated luma microtexture, grain-free output)
glsl-shaders-append="~~/shaders/skin_detail_luma.glsl"
glsl-shader-opts-append=sdl_strength=0.18
glsl-shader-opts-append=sdl_skin_hue=0.075
glsl-shader-opts-append=sdl_skin_width=0.070
glsl-shader-opts-append=sdl_skin_soft=0.030
glsl-shader-opts-append=sdl_freq=1.25
glsl-shader-opts-append=sdl_anisotropy=0.55

# F - Add 4K noise, also CRT blurring to soften the picture
# Add some texturing to uniform colors - anti plastic
glsl-shaders-append="~~/shaders/texture_classify.glsl"
glsl-shader-opts-append=tc_strength=1.0

# Light temporal texture for skin
glsl-shaders-append="~~/shaders/skin_temporal_grain.glsl"
glsl-shader-opts-append=stg_grain=10
glsl-shader-opts-append=stg_motion=0.5
glsl-shader-opts-append=stg_skin_boost=1.0
# Light temporal texture
glsl-shaders-append="~~/shaders/temporal_luma_grain.glsl"
glsl-shader-opts-append=tlg_grain=10
glsl-shader-opts-append=tlg_motion=0.5

glsl-shaders-append="~~/shaders-dl/noise_static_luma.hook"

# The pain - Thanks to Mattias Gustavsson for his amazing CRT shader
glsl-shaders-append="~~/shaders/crt-mattias.glsl"
glsl-shader-opts-append=cm_bloom_spread=3.0
glsl-shader-opts-append=cm_barrel=0.12
glsl-shader-opts-append=cm_chroma=1.0
glsl-shader-opts-append=cm_halation=0.05
glsl-shader-opts-append=cm_noise=0.045
glsl-shader-opts-append=cm_black_lift=0.02
glsl-shader-opts-append=cm_vignette=0.5
glsl-shader-opts-append=cm_contrast=0.15

# Up the brightness that takes a hit from CRT
glsl-shaders-append="~~/shaders/luma_brightness.glsl"
glsl-shader-opts-append=lb_strength=8.0
glsl-shader-opts-append=lb_shoulder=1

glsl-shaders-append="~~/shaders-dl/AMD_CAS_RT.glsl"

# Final pass: light luma-only grain at full output resolution
glsl-shaders-append="~~/shaders/temporal_luma_grain2.glsl"
glsl-shader-opts-append=tlg2_grain=5.0
glsl-shader-opts-append=tlg2_motion=0.3

