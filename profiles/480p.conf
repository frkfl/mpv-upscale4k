[lowres]
profile-cond=width < 800

# Restoration profile (noisy VHS, DV, TV captures). Will lower DVD quality a bit
af=highpass=f=99,lowpass=f=16001,dynaudnorm=f=251:g=15:p=0.8,crystalizer=3,alimiter

# A — Analog Repair
# Deinterlace
deinterlace=auto
# Deterministic OkLab (Björn Ottosson) BT.601/709 → BT.2020 normalizer
glsl-shaders-append="~~/shaders/autocolormatrix.glsl"
# Front-End — Remove most of the common analog insanity
glsl-shaders-append="~~/shaders/normalize_frontend.glsl"
glsl-shader-opts=nf_th_low=0.030,nf_th_high=0.10,nf_shift_px=0.80,nf_k_strength=0.58,nf_alpha_yfb=0.12,nf_beta_cfb=0.025,nf_blur_sigma=0.95,nf_protect_gate=0.72,nf_shadow_thresh=0.045,nf_knee_gain=1.0,nf_ema_low=0.15,nf_ema_high=0.55,nf_motion_thr=0.03,nf_s_chroma_protect=0.75,nf_e_ref=0.08,nf_max_desat=0.28
# Post Front-End Stabilizer — optimized (3-tap directional dering, fused stats, stronger shimmering removal).
glsl-shaders-append="~~/shaders/post_frontend_stabilizer.glsl"
glsl-shader-opts=pfs_dering_sigma=0.85,pfs_dering_mix_max=0.30,pfs_agc_gamma=0.6,pfs_agc_k0=0.02,pfs_agc_k1=0.35,pfs_agc_delta_max=0.25,pfs_agc_scale_kappa=0.9,pfs_unclip_shadow_power=0.88,pfs_unclip_highlight_power=1.05,pfs_unclip_eta_fill=0.03,pfs_hue_cap_deg_skin=3.0,pfs_hue_cap_deg_global=5.0,pfs_sat_cap_skin=0.12,pfs_sat_cap_global=0.20,pfs_meanY_guard_pct=0.005,pfs_ring_kappa=0.5,pfs_ring_gain=3.0,pfs_protect_grad_lo=0.06,pfs_protect_grad_hi=0.16,pfs_motion_lo=0.01,pfs_motion_hi=0.03,pfs_highlights_gate_Y=0.85
# Temporal Stabilizer — suppress horizontal shimmer - Deterministic
glsl-shaders-append="~~/shaders/temporal_stabilizer.glsl"
glsl-shader-opts=ts_gx_thresh=0.04,ts_gy_thresh=0.25,ts_alpha_base=0.30,ts_luma_gate_lo=0.05,ts_luma_gate_hi=0.90,ts_luma_gate_strength=0.10,ts_phase_offset_px=0.0,ts_blur_sigma=0.15
# Structural Cleaning Reinforcement Pass (Full-Power, Perceptual)
glsl-shaders-append="~~/shaders/struct_clean_fullpower.glsl"
glsl-shader-opts=scf_strength=3.0,scf_radius=5.0,scf_edge_protect=0.20,scf_chroma_weight=1.0,scf_temporal_alpha=1.0,scf_global_gain=3.0
# Edge Stabilization & Perceptual Phase Re-Alignment v2 (deterministic, perceptually tunable)
glsl-shaders-append="~~/shaders/edge_phase_realign_v2.glsl"
glsl-shader-opts=eprv_strength=2.0,eprv_edge_gain=4.0,eprv_edge_exp=3.0,eprv_phase_max=0.8,eprv_amp_norm=0.5,eprv_tangential_smooth=0.5,eprv_temporal_alpha=0.3,eprv_global_gain=3.0,eprv_skin_protect=0.0
# A not very fancy hdeband for hi8 8x8 macro blocks
glsl-shaders-append="~~/shaders/hi8_deblock.glsl"
# Mild Clean+BlockFix (edge-aware denoise + flat deblock + dering + stochastic gating)
glsl-shaders-append="~~/shaders/mild_clean_blockfix.glsl"
glsl-shader-opts=mcb_clean_strength=4.0

# B - Digital cleaning
# Weird geomatrical shapes attenuation
glsl-shaders-append="~~/shaders/fake_micro_texture_removal.glsl"
glsl-shader-opts=fmtr_clean=0.1
# Static noise
glsl-shaders-append="~~/shaders-dl/noise_static_chroma.glsl"    
# Softening
#glsl-shaders-append="~~/shaders-dl/nlmeans.glsl"
glsl-shaders-append="~~/shaders/nlmeans_parameter.glsl"
glsl-shader-opts=nl_strength=1.0
# Deband
glsl-shaders-append="~~/shaders-dl/hdeband.glsl"
# Restore white-ish colors
glsl-shaders-append="~~/shaders/white_restore_rgb.glsl"
# A bit of sharpening - CAS is smartly dumb, increase the contrast, no artifacts
glsl-shaders-append="~~/shaders-dl/AMD_CAS_RT.glsl"

# C - Upscaling 4K - Very soft with ravu, no neuronal network
glsl-shaders-append="~~/shaders-dl/CfL_Prediction_RT.glsl"
glsl-shaders-append="~~/shaders-dl/KrigBilateral.glsl"
glsl-shaders-append="~~/shaders-dl/ravu-r4.hook"
glsl-shaders-append="~~/shaders-dl/SSimSuperRes_RT.glsl"
glsl-shaders-append="~~/shaders-dl/SSimDownscaler.glsl"

# D - Calming the upscaling
# In-video subtitles cleaner
glsl-shaders-append="~~/shaders/subtitle_cleaner.glsl"
glsl-shader-opts=sc_strength=1.20
# Smoothing (border)
glsl-shaders-append="~~/shaders/micro_diffusion.glsl"
glsl-shader-opts=md_strength=1.6,md_low=0.001,md_high=0.04,md_radius=1.2
# Post-sharpen anti-ringing mop-up
glsl-shaders-append="~~/shaders/ringing_guard.glsl"
glsl-shader-opts=rg_strength=0.85:rg_radius=1.5:rg_gamma_in=1.0:rg_gamma_out=1.0:rg_lobe_strength=0.65:rg_lobe_threshold=0.015:rg_lobe_priority=0.65:rg_delta_cap=0.5:rg_apply_threshold=0.02
# Edge AA (stabilizes FSR/SSim ringing in motion)
glsl-shaders-append="~~/shaders/smaa.glsl"
glsl-shader-opts=sma_edge_strength=0.68,sma_corner_strength=0.22,sma_gamma=1.0
# Sharpening
glsl-shaders-append="~~/shaders-dl/LumaSharpen.glsl"

# E - Quality improvements
# Temporal sharpen (TXAA-lite; keep modest)
glsl-shaders-append="~~/shaders/temporal_sharpen.glsl"
glsl-shader-opts=tsh_strength=0.35,tsh_radius=1.0
# Hair-aware sharpen (detail recovery)
glsl-shaders-append="~~/shaders/hair_aware_sharpen.glsl"
glsl-shader-opts=has_sharp_amt=0.64,has_hf_gain=1.65,has_flat_guard=0.92,has_temp_sense=0.68,has_clamp_amt=0.026
# Edge-aware sharpen (reined in but still strong)
glsl-shaders-append="~~/shaders/masked_sharpen.glsl"
glsl-shader-opts=msh_strength=0.40,msh_clamp_amt=0.038,msh_edge_low=0.02,msh_edge_high=0.24,msh_flat_protect=0.88,msh_motion_gate=0.65,msh_gamma_in=1.0,msh_gamma_out=1.0
# Micro-contrast
glsl-shaders-append="~~/shaders/micro_contrast.glsl"
glsl-shader-opts=mc_radius=0.8,mc_amount=0.12,mc_threshold=0.02,mc_gamma_in=1.0,mc_gamma_out=1.0
# Details additions
glsl-shaders-append="~~/shaders-dl/skin_texture_amplifier.glsl"
# Micro Detail Enhancer (Luma-only, edge-gated)
glsl-shaders-append="~~/shaders/micro_detail_luma.glsl"
glsl-shader-opts=mdl_strength=0.28,mdl_threshold=0.004
# Skin Detail Enhancer (skin-gated luma microtexture, grain-free output)
glsl-shaders-append="~~/shaders/skin_detail_luma.glsl"
glsl-shader-opts=sdl_strength=0.18,sdl_skin_hue=0.075,sdl_skin_width=0.070,sdl_skin_soft=0.030,sdl_freq=1.25,sdl_anisotropy=0.55

# F - Add 4K noise, also CRT blurring to soften the picture
# Add some texturing to uniform colors - anti plastic
glsl-shaders-append="~~/shaders/texture_classify.glsl"
glsl-shader-opts=tc_strength=2.0
# Light temporal texture for skin
glsl-shaders-append="~~/shaders/skin_temporal_grain.glsl"
glsl-shader-opts=stg_grain=40,stg_motion=0.5,stg_skin_boost=1.0
# Light temporal texture
glsl-shaders-append="~~/shaders/temporal_luma_grain.glsl"
glsl-shader-opts=tlg_grain=45,tlg_motion=0.5
# Very light regular CRT like effect
glsl-shaders-append="~~/shaders/crt_natural.glsl"
glsl-shader-opts=cn_scan_amp=0.62,cn_scan_curve=1.20,cn_bloom_strength=0.20,cn_bloom_radius=1.35,cn_mask_strength=0.42,cn_mask_soft=0.60,cn_chroma_preserve=0.92,cn_sat_boost=1.06,cn_black_lift=0.015,cn_gamma_in=1.0,cn_gamma_out=1.0
# Up the brightness that takes a hit fromo CRT
glsl-shaders-append="~~/shaders/luma_brightness.glsl"
glsl-shader-opts=lb_strength=30.0,lb_shoulder=1


